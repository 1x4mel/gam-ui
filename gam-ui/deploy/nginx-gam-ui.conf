# ============================================================================
# gam-ui — same-origin SPA behind nginx (co-tenant on erp.local)
#
# Build & publish:
#   cd /home/frappe/gam/gam-ui
#   npm run deploy            # -> copies dist/ to $GAM_UI_DEPLOY_DIR (default /var/www/gam-ui)
#
# Include this file inside the existing `server { }` block that already serves
# erp.local (where /api + /socket.io are already proxied to bench). Drop the two
# `location` blocks below into that server block.
#
# The SPA is rooted at /gam-ui/ (matches gam-ui/.env.production VITE_BASE_URL),
# so Vue Router base + asset URLs all resolve same-origin — no CORS, shared
# session cookie with trader-ui / erpnext.
#
# Deploy layout:
#   GAM_UI_DEPLOY_MODE=flat (default): alias /var/www/gam-ui/;           (below)
#   GAM_UI_DEPLOY_MODE=symlink:        alias /var/www/gam-ui/current/;   (P4.1)
#     — the atomic-swap mode in scripts/deploy.sh builds into
#       /var/www/gam-ui/releases/<ts>/ and repoints /var/www/gam-ui/current
#       at it. Switch the `alias` line below to `.../current/` once you flip to
#       symlink mode, then reload nginx.
#
# Security headers (P1.7):
#   nginx does NOT inherit `add_header` into a nested `location` that declares
#   its OWN `add_header` (e.g. the asset/index.html blocks below set
#   `Cache-Control`). That is why the 5 security headers are repeated verbatim
#   in every location that owns an `add_header`. Keeping them aligned is part of
#   the contract — change one, change all (grep `X-Frame-Options`).
# ============================================================================

# Static SPA shell + assets at /gam-ui/.
# `alias` (not `root`) because the files live directly under the deploy dir.
location /gam-ui/ {
    alias /var/www/gam-ui/;
    index index.html;
    try_files $uri $uri/ /gam-ui/index.html;

    # --- Security headers (P1.7) -------------------------------------------
    # CSP: connect-src 'self' covers /api + /socket.io (same-origin); img-src
    # data: for inline favicons/avatars; style-src needs 'unsafe-inline' for
    # Tailwind v4 injected styles + Vue transitions. `always` => emitted for
    # error (4xx/5xx) responses too, not just 200.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Fingerprinted Vite assets — immutable, 1 year.
    # NOTE: this nested location owns an `add_header`, so the 5 security headers
    # above are NOT inherited and must be repeated here.
    location ~* ^/gam-ui/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        access_log off;
    }

    # Never cache the SPA entry document so new deploys are picked up.
    # NOTE: owns an `add_header`, security headers repeated.
    location = /gam-ui/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

# (Optional) convenience redirect: /gam-ui -> /gam-ui/
location = /gam-ui {
    return 301 /gam-ui/;
}

# NOTE: /api and /socket.io must already be proxied to the bench web (gunicorn,
# :8000) and socketio (node, :9000) services in this same server block, e.g.:
#
#   location /api/      { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; ... }
#   location /socket.io { proxy_pass http://127.0.0.1:9000; proxy_http_version 1.1;
#                         proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; ... }
#
# Frappe's common_site_config + bench already provide these for erp.local; the
# gam-ui block above simply reuses them.
